name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer kivy
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev bzip2 libbz2-dev libssl-dev libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev libncursesw5-dev libffi-dev uuid-dev tar zip unzip
    - name: Build with Buildozer
      run: |
        yes | buildozer android debug
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Copy-AI-APK
        path: bin/*.apk
        
